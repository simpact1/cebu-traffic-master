<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>세부 실시간 교통 마스터</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-start: #005a66;
      --bg-end: #00303b;
      --card-bg: rgba(0, 60, 70, 0.82);
      --card-bg-solid: #003c46;
      --card-border: rgba(236, 254, 255, 0.14);
      --primary: #14b8a6;
      --secondary: #2dd4bf;
      --light: #5eead4;
      --accent: #FF6B35;
      --accent-gold: #fef9c3;
      --text: #ecfeff;
      --text-muted: #99f6e4;
      --text-bright: #ccfbf1;
      --white: #ffffff;
      --shadow: 0 8px 28px rgba(0, 0, 0, 0.28);
      --shadow-card: 0 6px 22px rgba(0, 0, 0, 0.22);
      --radius: 16px;
      --map-height: 520px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, var(--bg-start) 0%, #004752 45%, var(--bg-end) 100%);
      background-attachment: fixed;
      color: var(--text);
      overflow-wrap: break-word;
    }

    /* 앱 텍스트 영역에만 줄바꿈 적용 — 지도(#map) 제외 */
    .top-bar,
    .map-box-header,
    .transport-section,
    .destination-section,
    .faq-section,
    .alert-bar,
    .map-placeholder,
    .map-location-status,
    .map-locate-btn,
    .dest-sub-links,
    .dest-sub-link-btn {
      word-break: break-all;
      overflow-wrap: break-word;
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100%;
      background: transparent;
      position: relative;
    }

    /* ===== Home (scroll) ===== */
    .home-view {
      min-height: 100vh;
      padding-bottom: 32px;
    }

    .top-bar {
      background: transparent;
      padding: 18px 16px 8px;
    }

    .brand {
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 6px;
      letter-spacing: 0.02em;
    }

    .page-title {
      color: var(--text-bright);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.25);
    }

    /* Alert */
    .alert-bar {
      height: 38px;
      background: linear-gradient(90deg, #C1121F, var(--accent), #E63946);
      overflow: hidden;
      display: flex;
      align-items: center;
      position: relative;
    }

    .alert-bar::before, .alert-bar::after {
      content: '';
      position: absolute;
      top: 0;
      width: 20px;
      height: 100%;
      z-index: 2;
      pointer-events: none;
    }

    .alert-bar::before { left: 0; background: linear-gradient(90deg, #C1121F, transparent); }
    .alert-bar::after { right: 0; background: linear-gradient(-90deg, #E63946, transparent); }

    .alert-track {
      display: flex;
      white-space: nowrap;
      animation: marquee 26s linear infinite;
    }

    .alert-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--white);
      font-size: 11px;
      font-weight: 600;
      padding: 0 28px;
    }

    @keyframes marquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* Large Traffic Map */
    .map-section {
      padding: 12px 16px 0;
    }

    .map-box {
      background: var(--card-bg);
      backdrop-filter: blur(8px);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-card);
      border: 1px solid var(--card-border);
    }

    .map-box-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: rgba(0, 48, 59, 0.6);
      border-bottom: 1px solid var(--card-border);
    }

    .map-box-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-bright);
    }

    .traffic-legend {
      display: flex;
      gap: 8px;
      font-size: 9px;
      color: var(--text-muted);
    }

    .legend-item { display: flex; align-items: center; gap: 3px; }
    .dot { width: 8px; height: 3px; border-radius: 2px; }
    .dot.g { background: #34A853; }
    .dot.y { background: #FBBC04; }
    .dot.r { background: #EA4335; }

    /* Google Maps 영역 — 앱 CSS와 완전 격리 */
    .map-canvas {
      background: #ffffff;
      isolation: isolate;
      position: relative;
      z-index: 0;
    }

    .map-locate-btn {
      position: absolute;
      left: 20px;
      bottom: 30px;
      z-index: 5;
      width: 60px;
      height: 60px;
      min-width: 60px;
      min-height: 60px;
      box-sizing: border-box;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 6px 5px;
      border: 2px solid rgba(45, 212, 191, 0.65);
      background: linear-gradient(155deg, #f0fdfa 0%, #ecfeff 55%, #ccfbf1 100%);
      color: #00404a;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0, 30, 38, 0.35);
      word-break: break-all;
      white-space: normal;
      overflow-wrap: break-word;
      overflow: hidden;
      transition: transform 0.15s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    .map-locate-btn:active:not(:disabled) {
      transform: scale(0.94);
    }

    .map-locate-btn:disabled,
    .map-locate-btn.is-syncing {
      opacity: 0.72;
      pointer-events: none;
    }

    .map-locate-btn-icon {
      font-size: 18px;
      line-height: 1;
      flex-shrink: 0;
    }

    .map-locate-btn-label {
      width: 100%;
      max-width: 48px;
      padding: 0 2px;
      font-size: 7.5px;
      font-weight: 700;
      line-height: 1.1;
      text-align: center;
      color: #005a66;
      word-break: break-all;
      white-space: normal;
      overflow-wrap: break-word;
    }

    .map-caption {
      margin: 0;
      padding: 8px 14px 10px;
      font-size: 10px;
      color: var(--text-muted);
      text-align: center;
      background: rgba(0, 48, 59, 0.5);
      border-top: 1px solid var(--card-border);
    }

    .map-location-status {
      margin: 0;
      padding: 6px 14px 8px;
      font-size: 10px;
      line-height: 1.5;
      color: #99f6e4;
      text-align: center;
      background: rgba(0, 48, 59, 0.5);
      border-top: 1px solid var(--card-border);
      word-break: break-all;
      white-space: normal;
      overflow-wrap: break-word;
    }

    .map-location-status[hidden] {
      display: none;
    }

    #map {
      width: 100%;
      height: var(--map-height);
      min-height: 500px;
      background: #ffffff !important;
      color: #212121 !important;
      font-family: Roboto, Arial, sans-serif !important;
      word-break: normal !important;
      overflow-wrap: normal !important;
      text-shadow: none !important;
    }

    /* 앱 전역 color/word-break 상속 차단 */
    #map .gm-style,
    #map .gm-style div,
    #map .gm-style span {
      word-break: normal !important;
      overflow-wrap: normal !important;
      text-shadow: none !important;
    }

    #map .gm-style .gm-style-iw,
    #map .gm-style .gm-style-iw * {
      color: #212121 !important;
      white-space: normal !important;
    }

    /* Google Maps POI·정류장 아이콘 DOM 숨김 (벡터 지도 대응) */
    #map .gm-style img[src*="maps.gstatic.com/mapfiles/ms/icons/"] {
      display: none !important;
      visibility: hidden !important;
      opacity: 0 !important;
    }

    .map-placeholder {
      height: var(--map-height);
      min-height: 500px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--card-bg-solid);
      font-size: 12px;
      color: var(--text-muted);
      padding: 16px;
      text-align: center;
    }

    /* Transport Grid (4x3) & Destination Grid (1x4) */
    .transport-section,
    .destination-section {
      padding: 16px 10px 0;
      word-break: break-all;
      white-space: normal;
      overflow-wrap: break-word;
    }

    .destination-section {
      padding-top: 20px;
      padding-bottom: 4px;
    }

    .transport-heading {
      font-size: 17px;
      font-weight: 700;
      color: var(--text-bright);
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    .transport-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .transport-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      width: 100%;
      min-height: 76px;
      padding: 8px 3px;
      box-sizing: border-box;
      background: rgba(0, 48, 59, 0.88);
      border: 2px solid rgba(236, 254, 255, 0.08);
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
      color: var(--text-bright);
      transition: border-color 0.25s ease, background 0.25s ease, transform 0.15s ease;
      word-break: break-all;
      white-space: normal;
      overflow-wrap: break-word;
    }

    .transport-btn:active {
      transform: scale(0.96);
    }

    .transport-btn.active {
      border-color: #38bdf8;
      background: rgba(0, 90, 102, 0.95);
      box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.25);
    }

    .transport-btn-icon {
      font-size: 1.8rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .transport-btn-label {
      width: 100%;
      font-size: 0.875rem;
      font-weight: 700;
      line-height: 1.25;
      text-align: center;
      color: var(--text-bright);
      word-break: break-all;
      white-space: normal;
      overflow-wrap: break-word;
    }

    .transport-detail-panel {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease, margin 0.3s ease;
      margin-top: 0;
    }

    .transport-detail-panel.open {
      margin-top: 12px;
    }

    .transport-detail-inner {
      background: var(--card-bg);
      backdrop-filter: blur(8px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: var(--shadow-card);
      word-break: break-all;
      white-space: normal;
      overflow-wrap: break-word;
    }

    .transport-detail-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-bright);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .transport-detail-text {
      font-size: 12px;
      line-height: 1.75;
      color: var(--text-muted);
      word-break: break-all;
      white-space: normal;
      overflow-wrap: break-word;
    }

    .transport-detail-text a.transport-detail-link {
      color: #bef264;
      font-weight: 700;
      text-decoration: underline;
      text-underline-offset: 3px;
      word-break: break-all;
      white-space: normal;
      overflow-wrap: break-word;
    }

    .transport-detail-text a.transport-detail-link:active {
      color: #d9f99d;
    }

    .dest-sub-links {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      margin-top: 12px;
      word-break: break-all;
      white-space: normal;
      overflow-wrap: break-word;
    }

    .dest-sub-links[hidden] {
      display: none;
    }

    .dest-sub-link-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      width: 100%;
      min-height: 76px;
      padding: 10px 4px;
      box-sizing: border-box;
      background: rgba(0, 48, 59, 0.88);
      border: 2px solid rgba(236, 254, 255, 0.08);
      border-radius: 10px;
      text-decoration: none;
      color: var(--text-bright);
      font-family: inherit;
      cursor: pointer;
      transition: border-color 0.25s ease, background 0.25s ease, transform 0.15s ease;
      word-break: break-all;
      white-space: normal;
      overflow-wrap: break-word;
    }

    .dest-sub-link-btn:active {
      transform: scale(0.96);
      background: rgba(0, 90, 102, 0.95);
      border-color: #38bdf8;
      box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.25);
    }

    .dest-sub-link-icon {
      font-size: 1.8rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .dest-sub-link-label {
      width: 100%;
      font-size: 0.875rem;
      font-weight: 700;
      line-height: 1.25;
      text-align: center;
      color: var(--text-bright);
      word-break: break-all;
      white-space: normal;
      overflow-wrap: break-word;
    }

    .section-label {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-bright);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, rgba(153, 246, 228, 0.35), transparent);
    }

    /* ===== FAQ Section ===== */
    .faq-section {
      padding: 20px 16px 40px;
    }

    .faq-intro {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 14px;
      line-height: 1.55;
    }

    .faq-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .faq-item {
      background: var(--card-bg);
      backdrop-filter: blur(8px);
      border-radius: var(--radius);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow-card);
      overflow: hidden;
      word-break: break-all;
      white-space: normal;
      overflow-wrap: break-word;
    }

    .faq-question {
      width: 100%;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 14px 16px;
      border: none;
      background: transparent;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      color: var(--text-bright);
      word-break: break-all;
      white-space: normal;
      overflow-wrap: break-word;
    }

    .faq-question:active {
      background: rgba(0, 70, 82, 0.35);
    }

    .faq-q-num {
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 700;
      color: var(--accent-gold);
      background: rgba(0, 0, 0, 0.28);
      padding: 3px 7px;
      border-radius: 6px;
      margin-top: 2px;
    }

    .faq-q-text {
      flex: 1;
      min-width: 0;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.5;
    }

    .faq-arrow {
      flex-shrink: 0;
      font-size: 11px;
      color: var(--light);
      transition: transform 0.3s ease;
      margin-top: 4px;
    }

    .faq-item.open .faq-arrow {
      transform: rotate(180deg);
    }

    .faq-answer-wrap {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
    }

    .faq-answer {
      padding: 0 16px 16px;
      font-size: 12px;
      line-height: 1.75;
      color: var(--text-muted);
      border-top: 1px solid rgba(153, 246, 228, 0.15);
      padding-top: 12px;
      margin: 0 16px 16px;
      word-break: break-all;
      white-space: normal;
      overflow-wrap: break-word;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Home -->
    <main class="home-view" id="homeView">
      <div class="alert-bar">
        <div class="alert-track" id="alertTrack"></div>
      </div>

      <header class="top-bar">
        <p class="brand">🌊 세부 실시간 교통 마스터</p>
        <h1 class="page-title">실시간 세부 교통상황</h1>
      </header>

      <section class="map-section">
        <div class="map-box">
          <div class="map-box-header">
            <span class="map-box-title">🚦 현재 도로 정체 현황</span>
            <div class="traffic-legend">
              <span class="legend-item"><span class="dot g"></span>원활</span>
              <span class="legend-item"><span class="dot y"></span>서행</span>
              <span class="legend-item"><span class="dot r"></span>정체</span>
            </div>
          </div>
          <div class="map-canvas">
            <div id="map"></div>
            <button type="button" class="map-locate-btn" id="mapLocateBtn" aria-label="내 위치로 동기화" title="내 위치로">
              <span class="map-locate-btn-icon" aria-hidden="true">🎯</span>
              <span class="map-locate-btn-label">내 위치로</span>
            </button>
          </div>
          <p class="map-caption">도로 위 색선(초록·노랑·빨강)은 실시간 교통 정체 표시입니다</p>
          <p class="map-location-status" id="mapLocationStatus" hidden></p>
        </div>
      </section>

      <section class="transport-section">
        <h2 class="transport-heading">세부 교통수단</h2>
        <div class="transport-grid" id="transportGrid"></div>
        <div class="transport-detail-panel" id="transportDetailPanel">
          <div class="transport-detail-inner">
            <div class="transport-detail-title" id="transportDetailTitle"></div>
            <p class="transport-detail-text" id="transportDetailText"></p>
          </div>
        </div>
      </section>

      <section class="destination-section">
        <h2 class="transport-heading">세부 인기 목적지 이동방법</h2>
        <div class="transport-grid" id="destinationGrid"></div>
        <div class="transport-detail-panel" id="destinationDetailPanel">
          <div class="transport-detail-inner">
            <div class="transport-detail-title" id="destinationDetailTitle"></div>
            <p class="transport-detail-text" id="destinationDetailText"></p>
            <div class="dest-sub-links" id="destinationSubLinks" hidden></div>
          </div>
        </div>
      </section>

      <section class="faq-section">
        <h2 class="section-label">❓ 자주하는 질문 (FAQ)</h2>
        <p class="faq-intro">세부 여행자들이 가장 많이 묻는 교통·이동 관련 질문을 모았습니다.</p>
        <div class="faq-list" id="faqList"></div>
      </section>
    </main>
  </div>

  <script>
    const GOOGLE_MAPS_API_KEY = 'AIzaSyA56YUnyJHHaZwHZLf2tyiELLqJvsPiwMY';
    /* Google Cloud Console > Map Styles에서 Transit 숨김 후 Map ID 입력 (선택) */
    const GOOGLE_MAP_ID = '';

    const alertMessages = [
      '현재 시눌로그 행사로 올드브릿지 통제',
      '폭우로 AS포투나 침수 주의 — 우회 권장',
      'NAIA 3터미널 → 세부 항공편 지연 다수 발생',
      '막탄-세부 연결교량 출퇴근 시간 혼잡'
    ];

    /* Alert */
    function initAlertBar() {
      const track = document.getElementById('alertTrack');
      const items = [...alertMessages, ...alertMessages];
      track.innerHTML = items.map(m =>
        `<span class="alert-item">⚠️ ${m}</span>`
      ).join('');
    }

    /* Google Map */
    let map = null;
    let mapsLoaded = false;
    let myLocationMarker = null;

    const CEBU_MAP_CENTER = { lat: 10.3157, lng: 123.8854 };
    const CEBU_MAP_ZOOM = 12;
    const MY_LOCATION_ZOOM = 15;

    function showMapPlaceholder() {
      document.getElementById('map').innerHTML =
        '<div class="map-placeholder">지도를 불러오는 중…<br>잠시 후 다시 시도해 주세요.</div>';
    }

    function initGoogleMap() {
      if (mapsLoaded) return;
      const script = document.createElement('script');
      script.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_MAPS_API_KEY}&v=weekly&callback=onGoogleMapsReady`;
      script.async = true;
      script.defer = true;
      script.onerror = showMapPlaceholder;
      document.head.appendChild(script);
    }

    /* 대중교통 정류장·POI 아이콘 숨김 (styles — 래스터 폴백용) */
    const TRANSIT_STATION_HIDE_STYLES = [
      {
        featureType: 'transit.station',
        elementType: 'labels.icon',
        stylers: [{ visibility: 'off' }]
      },
      {
        featureType: 'transit.station',
        stylers: [{ visibility: 'off' }]
      },
      {
        featureType: 'transit',
        elementType: 'labels.icon',
        stylers: [{ visibility: 'off' }]
      },
      {
        featureType: 'poi',
        elementType: 'labels.icon',
        stylers: [{ visibility: 'off' }]
      }
    ];

    let mapIconObserver = null;

    /* 벡터 지도: styles 무시 → Google DOM 아이콘 직접 제거 */
    function hideGoogleMapPoiIcons() {
      const mapRoot = document.getElementById('map');
      if (!mapRoot) return;

      const isMapControl = (el) =>
        el.closest('.gm-bundled-control, .gm-svpc, .gm-fullscreen-control, .gm-style-cc, .gm-style-mtc');

      mapRoot.querySelectorAll('.gm-style [role="button"]').forEach(el => {
        if (!isMapControl(el)) {
          el.style.setProperty('display', 'none', 'important');
          el.style.setProperty('visibility', 'hidden', 'important');
        }
      });

      mapRoot.querySelectorAll('.gm-style img').forEach(img => {
        if (isMapControl(img)) return;
        const src = (img.src || '').toLowerCase();
        if (src.includes('transparent.png')) return;
        if (src.includes('maps.gstatic.com/mapfiles/ms/icons/') ||
            src.includes('maps.gstatic.com/intl') ||
            /transit|bus|stop|rail|metro|train/i.test(src)) {
          img.style.setProperty('display', 'none', 'important');
          img.style.setProperty('visibility', 'hidden', 'important');
          img.style.setProperty('opacity', '0', 'important');
        }
      });

      mapRoot.querySelectorAll('.gm-style div[style*="background-image"]').forEach(el => {
        if (isMapControl(el)) return;
        const bg = (el.style.backgroundImage || '').toLowerCase();
        if (/transit|bus|stop|icons\/|ms\/icons/i.test(bg)) {
          el.style.setProperty('display', 'none', 'important');
        }
      });
    }

    function watchMapIcons() {
      const mapRoot = document.getElementById('map');
      if (!mapRoot || mapIconObserver) return;
      mapIconObserver = new MutationObserver(hideGoogleMapPoiIcons);
      mapIconObserver.observe(mapRoot, { childList: true, subtree: true, attributes: true, attributeFilter: ['src', 'style'] });
    }

    function setMapLocationStatus(message) {
      const el = document.getElementById('mapLocationStatus');
      if (!el) return;
      if (message) {
        el.textContent = message;
        el.hidden = false;
      } else {
        el.hidden = true;
        el.textContent = '';
      }
    }

    function getMyLocationIcon() {
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 28 28">
        <circle cx="14" cy="14" r="12" fill="#4285F4" fill-opacity="0.22"/>
        <circle cx="14" cy="14" r="7" fill="#4285F4" stroke="#ffffff" stroke-width="2.5"/>
      </svg>`;
      return {
        url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg.trim()),
        scaledSize: new google.maps.Size(28, 28),
        anchor: new google.maps.Point(14, 14)
      };
    }

    function updateMyLocationOnMap(lat, lng) {
      if (!map) return;
      const pos = { lat, lng };

      if (!myLocationMarker) {
        myLocationMarker = new google.maps.Marker({
          map,
          position: pos,
          icon: getMyLocationIcon(),
          title: '내 위치',
          zIndex: 9999,
          clickable: false
        });
      } else {
        myLocationMarker.setPosition(pos);
      }

      map.panTo(pos);
      const zoom = map.getZoom();
      if (typeof zoom !== 'number' || zoom < MY_LOCATION_ZOOM) {
        map.setZoom(MY_LOCATION_ZOOM);
      }
    }

    const GEO_ERROR_MESSAGES = {
      1: '위치 권한이 거부되어 세부 중심 지도를 표시합니다.',
      2: '위치 정보를 사용할 수 없어 세부 중심 지도를 표시합니다.',
      3: '위치 확인 시간이 초과되어 세부 중심 지도를 표시합니다.'
    };

    function setLocateButtonSyncing(syncing) {
      const btn = document.getElementById('mapLocateBtn');
      if (!btn) return;
      btn.classList.toggle('is-syncing', syncing);
      btn.disabled = syncing;
    }

    /* GPS는 [🎯 내 위치로] 버튼 클릭 시에만 요청 (진입·뒤로가기 시 팝업 없음) */
    function syncMyLocationFromDevice() {
      if (!map) return;

      if (!navigator.geolocation) {
        setMapLocationStatus('이 기기는 위치 서비스를 지원하지 않아 세부 중심 지도를 표시합니다.');
        return;
      }

      const geoOptions = {
        enableHighAccuracy: true,
        timeout: 15000,
        maximumAge: 0
      };

      setLocateButtonSyncing(true);

      const onGeoSuccess = (position) => {
        setLocateButtonSyncing(false);
        if (!position || !position.coords) return;
        setMapLocationStatus('');
        updateMyLocationOnMap(position.coords.latitude, position.coords.longitude);
      };

      const onGeoError = (err) => {
        setLocateButtonSyncing(false);
        const code = err && err.code;
        setMapLocationStatus(
          GEO_ERROR_MESSAGES[code] || '위치를 가져오지 못해 세부 중심 지도를 표시합니다.'
        );
        if (!myLocationMarker) {
          map.setCenter(CEBU_MAP_CENTER);
          map.setZoom(CEBU_MAP_ZOOM);
        }
      };

      try {
        navigator.geolocation.getCurrentPosition(onGeoSuccess, onGeoError, geoOptions);
      } catch (_) {
        onGeoError({ code: 2 });
      }
    }

    function initMapLocateButton() {
      const btn = document.getElementById('mapLocateBtn');

      });
    }

    window.onGoogleMapsReady = function initMap() {

      map = new google.maps.Map(mapEl, {

        zoom: CEBU_MAP_ZOOM,
        mapTypeControl: false,
        streetViewControl: false,
        fullscreenControl: false,
        zoomControl: true,
        gestureHandling: 'greedy',
        clickableIcons: false,
        styles: TRANSIT_STATION_HIDE_STYLES,
        ...(GOOGLE_MAP_ID ? { mapId: GOOGLE_MAP_ID } : {})
      });

      google.maps.event.addListener(map, 'tilesloaded', hideGoogleMapPoiIcons);
      google.maps.event.addListener(map, 'idle', hideGoogleMapPoiIcons);
      google.maps.event.addListenerOnce(map, 'idle', watchMapIcons);

      const iconCleanup = setInterval(hideGoogleMapPoiIcons, 400);
      setTimeout(() => clearInterval(iconCleanup), 20000);

      new google.maps.TrafficLayer().setMap(map);

      setTimeout(() => {
        google.maps.event.trigger(map, 'resize');
        hideGoogleMapPoiIcons();
      }, 300);

    function renderFaq() {
      const container = document.getElementById('faqList');
      faqItems.forEach((item, i) => {
        const el = document.createElement('div');
        el.className = 'faq-item';
        el.innerHTML = `
          <button class="faq-question" type="button" aria-expanded="false">
            <span class="faq-q-num">Q${i + 1}</span>
            <span class="faq-q-text">${item.q}</span>
            <span class="faq-arrow">▼</span>
          </button>
          <div class="faq-answer-wrap">
            <p class="faq-answer">${item.a}</p>
          </div>`;
        container.appendChild(el);
      });

      container.addEventListener('click', e => {
        const btn = e.target.closest('.faq-question');
        if (!btn) return;
        const item = btn.parentElement;
        const wrap = item.querySelector('.faq-answer-wrap');
        const answer = item.querySelector('.faq-answer');
        const isOpen = item.classList.contains('open');

        container.querySelectorAll('.faq-item.open').forEach(openItem => {
          if (openItem !== item) {
            openItem.classList.remove('open');
            openItem.querySelector('.faq-question').setAttribute('aria-expanded', 'false');
            openItem.querySelector('.faq-answer-wrap').style.maxHeight = '0';
          }
        });

        if (isOpen) {
          item.classList.remove('open');
          btn.setAttribute('aria-expanded', 'false');
          wrap.style.maxHeight = '0';
        } else {
          item.classList.add('open');
          btn.setAttribute('aria-expanded', 'true');
          wrap.style.maxHeight = answer.scrollHeight + 'px';
        }
      });
    }

    let activeTransportId = null;

    function renderTransportGrid() {
      const grid = document.getElementById('transportGrid');
      const panel = document.getElementById('transportDetailPanel');
      const titleEl = document.getElementById('transportDetailTitle');
      const textEl = document.getElementById('transportDetailText');
      const inner = panel.querySelector('.transport-detail-inner');

      transportModes.forEach(item => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'transport-btn';
        btn.dataset.id = item.id;
        btn.innerHTML = `
          <span class="transport-btn-icon">${item.icon}</span>
          <span class="transport-btn-label">${item.name}</span>`;
        grid.appendChild(btn);
      });

      grid.addEventListener('click', e => {
        const btn = e.target.closest('.transport-btn');
        if (!btn) return;

        const id = Number(btn.dataset.id);
        const item = transportModes.find(t => t.id === id);
        if (!item) return;

        if (activeTransportId === id) {
          closeTransportDetail();
          return;
        }

        closeDestinationDetail();
        grid.querySelectorAll('.transport-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeTransportId = id;

        titleEl.innerHTML = `<span>${item.icon}</span> ${item.name}`;
        textEl.innerHTML = item.desc;

        panel.classList.add('open');
        panel.style.maxHeight = inner.scrollHeight + 'px';
      });
    }

    let activeDestinationId = null;

    function closeTransportDetail() {
      activeTransportId = null;
      const grid = document.getElementById('transportGrid');
      const panel = document.getElementById('transportDetailPanel');
      if (!grid || !panel) return;
      grid.querySelectorAll('.transport-btn').forEach(b => b.classList.remove('active'));
      panel.classList.remove('open');
      panel.style.maxHeight = '0';
    }

    function closeDestinationDetail() {
      activeDestinationId = null;
      const grid = document.getElementById('destinationGrid');
      const panel = document.getElementById('destinationDetailPanel');
      const subLinks = document.getElementById('destinationSubLinks');
      if (!grid || !panel) return;
      grid.querySelectorAll('.transport-btn').forEach(b => b.classList.remove('active'));
      if (subLinks) {
        subLinks.hidden = true;
        subLinks.innerHTML = '';
      }
      panel.classList.remove('open');
      panel.style.maxHeight = '0';
    }

    function renderDestinationSubLinks(item) {
      const wrap = document.getElementById('destinationSubLinks');
      if (!wrap) return;

      if (!item.subLinks || !item.subLinks.length) {
        wrap.hidden = true;
        wrap.innerHTML = '';
        return;
      }

      wrap.hidden = false;
      wrap.innerHTML = item.subLinks.map(link => `
        <a href="${link.url}" target="_self" class="dest-sub-link-btn">
          <span class="dest-sub-link-icon">${link.icon}</span>
          <span class="dest-sub-link-label">${link.label}</span>
        </a>
      `).join('');
    }

    function openDestinationDetailPanel(panel, inner) {
      panel.classList.add('open');
      requestAnimationFrame(() => {
        panel.style.maxHeight = inner.scrollHeight + 'px';
      });
    }

    function renderDestinationGrid() {
      const grid = document.getElementById('destinationGrid');
      const panel = document.getElementById('destinationDetailPanel');
      const titleEl = document.getElementById('destinationDetailTitle');
      const textEl = document.getElementById('destinationDetailText');
      const inner = panel.querySelector('.transport-detail-inner');

      destinationModes.forEach(item => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'transport-btn';
        btn.dataset.id = item.id;
        btn.innerHTML = `
          <span class="transport-btn-icon">${item.icon}</span>
          <span class="transport-btn-label">${item.name}</span>`;
        grid.appendChild(btn);
      });

      grid.addEventListener('click', e => {
        const btn = e.target.closest('.transport-btn');
        if (!btn) return;

        const id = Number(btn.dataset.id);
        const item = destinationModes.find(d => d.id === id);
        if (!item) return;

        if (activeDestinationId === id) {
          closeDestinationDetail();
          return;
        }

        closeTransportDetail();
        grid.querySelectorAll('.transport-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeDestinationId = id;

        titleEl.innerHTML = `<span>${item.icon}</span> ${item.name}`;
        textEl.innerHTML = item.desc;
        renderDestinationSubLinks(item);
        openDestinationDetailPanel(panel, inner);
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      initAlertBar();
      renderTransportGrid();
      renderDestinationGrid();
      renderFaq();
      initMapLocateButton();
      initGoogleMap();
